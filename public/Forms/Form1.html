<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="keywords" content="Forms in html " />
    <meta name="description" content="short summary about your website" />
    <link rel="shortcut icon" href="../images/favicon.ico" />
    <title>Form</title>
    <style>
      .container {
            width: 150px;
            height: 100px;
            border: 1px solid gray;
            padding: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* Default color of "I Accept" text */
        .terms + span {
            color: red;
            font-weight: bold;
        }

        /* Change text color when checkbox is checked */
        .terms:checked + span {
            color: green;
        }
         .btn button {
        padding: 10px 20px;
        background-color: green;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
        .btn{
          display: none;
          
        }
        .terms:checked ~ .btn {
        display: block;
        margin-top: -10px;
      }

    </style>
  </head>
  <body>
    <form action="">
      <label for="name">Enter Name</label>
      <input type="text" id="name" name="name" value="john" readonly />

      <br />
      <br />

      <label for="email">Enter Email</label>
      <input type="email" name="email" id="email" required />

      <br />
      <br />

      <label for="password">Enter Password</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Your Password"
        min="4"
        max="10"
      />

      <br /><br />

      <!-- minlength="4"
        maxlength="10" -->
      <label for="city">Enter City</label>
      <input
        type="text"
        name="city"
        id="city"
        list="cities"
        size="25"
        placeholder="Enter your City Name"
        autofocus
        required
        pattern="[a-z,A-Z]{3,15}"
      />
      <datalist id="cities">
        <option value="Hyderabad"></option>
        <option value="Delhi"></option>
        <option value="Mumbai"></option>
        <option value="Chennai"></option>
      </datalist>

      <br />
      <br />

      <h3>Select Gender</h3>
      <label for="male">Male</label>
      <input type="radio" name="gender" id="male" value="male" checked />

      <label for="female">Female</label>
      <input type="radio" name="gender" id="female" value="female" />

      <label for="others">Others</label>
      <input type="radio" name="gender" id="other" value="other" />

      <br />
      <br />

      <label for="age">Age</label>
      <input
        type="number"
        id="age"
        name="age"
        required
        placeholder="Enter age"
        min="18"
        max="85"
        style="width: 80px"
        value="18"
      />
      <br />
      <br />

      <!-- <label for="age1">Age</label>
      <input type="range" id="age1" name="age1" required min="18" max="85" />
      <br />
      <br /> -->

      <label>
        <input type="checkbox" name="course" value="java" checked />
        Java
      </label>

      <label>
        <input type="checkbox" name="course" value="python" />
        Python
      </label>
      <label>
        <input type="checkbox" name="course" value="C++" />
        C++
      </label>
      <label>
        <input type="checkbox" name="course" value="oracle" />
        Oracle
      </label>
      <label>
        <input type="checkbox" name="course" value="springboot" />
        SpringBoot
      </label>

      <br />
      <br />

      <label for="date">Select Date</label>
      <input
        type="date"
        id="date"
        name="date"
        required
        min="2026-05-01"
        max="2027-05-31"
      />
      <br />
      <br />

      <label for="mobile">Mobile No:</label>
      <input
        type="tel"
        id="mobile"
        name="mobile"
        value="+91 "
        pattern="^\+91\s\d{10}$"
        size="14"
        placeholder=" Your Number"
      />
      <br />
      <br />

      <label for="resume">Upload Resume</label>
      <input
        type="file"
        name="resume"
        id="resume"
        accept="jpg"
        required
        multiple
      />

      <br>
      <br>

        <!-- Terms of Service Box -->
        <div class="container">
            Terms of Service
        </div>

        <!-- Checkbox, Text, and Button -->
        <div>
            <input
                type="checkbox"
                class="terms"
                name="accept"
                value="yes"
                id="accept"
            />
            <span>I Accept</span>
            <br><br>

             <div class="btn">
              <button type="submit">Register</button>
             </div>
    </form>

    
</html>

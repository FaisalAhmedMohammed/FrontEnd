<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creating Checkbox</title>
  </head>
  <body>
    <form action="">
      <h3>Select Couses</h3>
      <label for="java">Java</label>
      <input type="checkbox" id="java" name="course" value="java" required />

      <label for=".Net">.Net</label>
      <input type="checkbox" id=".Net" name="course" value=".Net" required />

      <label for="Oracle">Oracle</label>
      <input
        type="checkbox"
        id="Oracle"
        name="course"
        value="Oracle"
        required
      />

      <label for="Springboot">Springboot</label>
      <input
        type="checkbox"
        id="Springboot"
        name="course"
        value="Springboot"
        required
      />

      <button type="submit">Register</button>
    </form>
  </body>
</html>

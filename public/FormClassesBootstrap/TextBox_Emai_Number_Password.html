<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lables</title>
    <link
      rel="stylesheet"
      href="../..//node_modules/bootstrap-icons/font/bootstrap-icons.css"
    />
    <link
      rel="stylesheet"
      href="../../node_modules/bootstrap/dist/css/bootstrap.css"
    />
    <link rel="shortcut icon" href="../images/favicon.ico" />
  </head>
  <body class="container-fluid mt-4">
    <h4>Label Textbox Email Number Password</h4>
    <form action="" class="w-25">
      <div class="mb-4">
        <label for="name" class="form-label">User Name</label>
        <input
          type="text"
          name="name"
          id="name"
          class="form-control"
          placeholder="Enter Name"
          required
          autofocus
        />
      </div>

      <div class="mb-4">
        <label for="email" class="form form-label">Enter Email</label>
        <input
          type="email"
          name="email"
          id="email"
          class="form-control"
          required
        />
      </div>

      <div class="mb-4">
        <label for="number" class="form-label">Enter Number</label>
        <input
          type="number"
          name="number"
          id="number"
          class="form-control"
          required
        />
      </div>
      <div class="mb-4">
        <label for="password" class="form-label">Enter Password</label>
        <input
          type="password"
          name="password"
          id="password"
          class="form-control"
          placeholder="Password"
          required
        />
      </div>
      <button class="btn btn-primary me-5" type="submit">Submit</button
      ><span><button class="btn btn-warning" type="reset">Reset</button></span>
    </form>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroable List</title>
    <meta name="keywords" content="some important keywords about your website">
    <meta name="Description" content="Short summary Description about your website">
    <link rel="shortcut icon" href="../public/images/favicon.ico">
    <style>
        ol{
            list-style: none;
            border: 2px solid black;
            width: 300px;
            height: 80px;
            overflow: auto ;
        }
        li{
            background-color: black;
            color: white;
            width: 150px;
            padding: 15px;
            margin-bottom: 10px;
            
        }
        li:hover{
            background-color: green;
            cursor: grab;
        }
    
    </style>
</head>
<body>
    <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>JAVA SCRIPT</li>
        <li>BOOSTRAP</li>
        <li>ANGULAR</li>
        <li>REACT</li>
        <li>JQUERY</li>
        <li>TAILWIND CSS</li>
    </ol>
    
</body>
</html>

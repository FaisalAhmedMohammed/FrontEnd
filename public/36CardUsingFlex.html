<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>card uisng Flex</title>
    <link rel="shortcut icon" href="images/favicon.ico" />
    <meta
      name="keywords"
      content="some important keywords about this web site"
    />
    <meta
      name="Description"
      content="Creating basic Cards using displex flex property"
    />
    <style>
      * {
        padding: 0px;
        margin: 0px;
        box-sizing: border-box;
      }
      .container {
        height: 100vh;
        width: 100vw;
        background-color: #8bc6ec;
        background-image: linear-gradient(135deg, #8bc6ec 0%, #9599e2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .box {
        width: 300px;
        background-color: white;
        display: flex;
        flex-direction: column;
        gap: 20px;
        border-radius: 20px;
        align-items: center;
        padding-bottom: 20px;
      }
      .box img {
        width: 100%;
        height: 150px;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
      }
      #order {
        display: flex;
        flex-direction: column;
        gap: 15px;
        align-items: center;
        text-align: center;
        width: 75%;
        font-size: 13px;
      }
      .amount {
        width: 80%;
        height: 60px;
        border-radius: 10px;
        background-color: #d6ecf7;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 15px;
      }
      #payment {
        width: 80%;
        height: 45px; /* fixed height instead of % */
        border-radius: 10px;
        background-color: rgb(44, 44, 74);
        color: white;
        font-size: 14px;
        font-weight: 500;
        border: none;

        display: flex;
        justify-content: center;
        align-items: center;

        box-shadow:
          0px 10px 20px rgba(0, 0, 0, 0.19),
          0 6px 6px rgba(0, 0, 0, 0.23);
      }
      .order a {
        font-size: 15px;
        font-weight: bold;
        text-decoration: none;
        color: rgb(94, 83, 83);
      }
      #leftbox {
        display: flex;
        flex-direction: row;
        gap: 10px;
      }
      #imagebox img {
        height: 50px;
        width: 40px;
      }
      #amountbox {
        display: flex;
        flex-direction: column;
        margin-top: 10px;
      }
      #amountbox p:first-child {
        font-size: 13px;
        color: #555;
      }
      #amountbox p:last-child {
        font-size: 14px;
        font-weight: bold;
      }
      #amountbox p {
        font-size: 15px;
        display: flex;
      }
      #amountbox {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      #rightbox {
        padding: 10px;
      }
      #rightbox a {
        text-decoration: none;
        font-size: 13px;
        color: #2f5bd3;
        font-weight: 500;
      }
      @media (max-width: 500px) {
        .box {
          width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">
        <img src="images/razerpay.peg.jfif" alt="" />

        <div id="order">
          <h3>Order Summary</h3>
          <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Vitae
            voluptates ipsa iusto eos quia, consequuntur sed repudiandae unde
            quam perferendis!
          </p>
        </div>

        <div class="amount">
          <div id="leftbox">
            <div id="imagebox">
              <img src="images/music.png" alt="" />
            </div>
            <div id="amountbox">
              <p>Amount</p>
              <p>$99/Year</p>
            </div>
          </div>
          <div id="rightbox">
            <a href="#">Change</a>
          </div>
        </div>

        <button id="payment">Proceed to Payment</button>

        <div class="order"><a href="">Cancel order</a></div>
      </div>
    </div>
  </body>
</html>

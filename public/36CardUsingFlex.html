<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>card uisng Flex</title>
    <link rel="shortcut icon" href="images/favicon.ico" />
    <meta
      name="keywords"
      content="some important keywords about this web site"
    />
    <meta
      name="Description"
      content="Creating basic Cards using displex flex property"
    />
    <style>
      * {
        padding: 0px;
        margin: 0px;
        box-sizing: border-box;
      }
      .container {
        height: 100vh;
        width: 100vw;
        background-color: #8bc6ec;
        background-image: linear-gradient(135deg, #8bc6ec 0%, #9599e2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .box {
        height: 400px;
        width: 300px;
        background-color: white;
        display: flex;
        flex-direction: column;
        gap: 25px;
        border-radius: 20px;
        align-items: center;
      }
      .box img {
        width: 100%;
        height: 35%;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
      }
      #order {
        display: flex;
        flex-direction: column;
        gap: 15px;
        align-items: center;
        text-align: center;
        width: 75%;
        font-size: 13px;
      }
      .amount {
        width: 80%;
        height: 10%;
        border-radius: 10px;
        background-color: lightblue;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .payment {
        width: 80%;
        height: 9%;
        border-radius: 10px;
        background-color: rgb(44, 44, 74);
        color: white;

        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">
        <img src="images/razerpay.peg.jfif" alt="" />

        <div id="order">
          <h3>Order Summary</h3>
          <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Vitae
            voluptates ipsa iusto eos quia, consequuntur sed repudiandae unde
            quam perferendis!
          </p>
        </div>

        <div class="amount"></div>

        <div class="payment">
          <p>Proceed to Payment</p>
        </div>
      </div>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discription List | Term | Description</title>
    <meta name="keywords" content="some keywords relsted to your website">
    <meta name="Description" charset="short Description about your website">
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="shortcut icon" href="../public/images/favicon.ico">
    <style>
        dl{
            display: grid;
            grid-template-columns: 6fr 6fr;
            
        }
        dt{
            background-color: black;
            color: white;
            width: 400px;
            padding: 10px;
            margin-bottom: 10px;
            font-family: Arial, Helvetica, sans-serif;

        }
        dd{
            background-color: gray;
            color: white;
            width: 400px;
            padding: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <dl>
        <dt>FirstName</dt>
        <dd>Mohammed Faisal</dd>
        <dt>Last Name</dt>
        <dd>Ahmed</dd>
        <dt>age</dt>
        <dd>25</dd>
        <dt>address</dt>
        <dd>Hyderabad</dd>
    </dl>
</body>
</html>

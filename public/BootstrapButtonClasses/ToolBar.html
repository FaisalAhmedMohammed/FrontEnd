<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToolBar</title>
    <link
      rel="stylesheet"
      href="../../../node_modules/bootstrap-icons/font/bootstrap-icons.css"
    />
    <link
      rel="stylesheet"
      href="../../../node_modules/bootstrap/dist/css/bootstrap.css"
    />
    <link rel="shortcut icon" href="../images/favicon.ico" />
  </head>
  <body class="container-fluid">
    <h2 class="mt-3">ToolBar</h2>
    <div class="btn btn-toolbar d-flex justify-content-between bg-danger">
      <div class="btn btn-group">
        <button class="btn btn-danger">Home</button>
        <button class="btn btn-danger">About</button>
        <button class="btn btn-danger">Contact</button>
      </div>

      <div class="btn btn-group">
        <button class="btn btn-danger">
          <span class="bi bi-search"></span>
        </button>
        <button class="btn btn-danger">
          <span class="bi bi-heart-fill"></span>
        </button>
        <button class="btn btn-danger">
          <span class="bi bi-person"></span>
        </button>
      </div>
    </div>
  </body>
</html>

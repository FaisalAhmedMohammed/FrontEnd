<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BootStrap Button Classes</title>
    <link
      rel="stylesheet"
      href="../../../node_modules/bootstrap-icons/font/bootstrap-icons.css"
    />
    <link
      rel="stylesheet"
      href="../../../node_modules/bootstrap/dist/css/bootstrap.css"
    />
    <link rel="shortcut icon" href="../images/favicon.ico" />
  </head>
  <body class="container-fluid">
    <div>
      <h2>Base Button</h2>
      <div>
        <button class="btn">Submit</button>
      </div>
      <h2 class="mt-4">Contextual Button</h2>
      <div>
        <button class="btn btn-primary btn-sm">Insert</button>
        <button class="btn btn-danger">Update</button>
        <button class="btn btn-success btn-lg">Delete</button>
      </div>

      <h2 class="mt-4">Outline Buttons</h2>
      <div>
        <button class="btn btn btn-outline-danger">Insert</button>
        <button class="btn btn-outline-success">Update</button>
        <button class="btn btn-outline-warning">Delete</button>
      </div>
      <h2 class="mt-3">Button Group Horizontal</h2>
      <div class="btn btn-group">
        <button class="btn btn-danger">Insert</button>
        <button class="btn btn-success">Update</button>
        <button class="btn btn-warning">Delete</button>
      </div>
      <h2 class="mt-3">Button Group Vertical</h2>
      <div class="btn btn-group-vertical">
        <button class="btn btn-danger">Insert</button>
        <button class="btn btn-success">Update</button>
        <button class="btn btn-warning">Delete</button>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animations</title>
    <link rel="shortcut icon" href="images/favicon.ico" />
    <style>
      * {
        margin: 0px;
        padding: 0px;
      }
      .container {
        height: 100vh;
        width: 100vw;
        background-color: beige;
        border: 5px solid blue;
      }
      .box {
        background-color: blue;
        height: 80px;
        width: 250px;
        border-radius: 10px;
        margin: 10px;
        position: relative;
        border: 2px solid brown;
        animation-name: rightmove;
        animation-duration: 5s;
        animation-timing-function: cubic-bezier(0.3, 0.3, 0.3, 0.5);
        animation-delay: 0s;
        animation-iteration-count: infinite;
        animation-direction: alternate;
      }
      .box2 {
        height: 80px;
        width: 250px;
        border: 2px solid brown;
        background-color: blue;
        border-radius: 10px;
        margin: 10px;
        position: relative;
        /* animation-name: leftmove;
        animation-duration: 5s;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
        animation-direction: alternate; */
        animation: leftmove 5s linear 0s infinite alternate none;
      }
      .circle {
        height: 100px;
        width: 100px;
        border: 1px solid black;
        background-color: blue;
        border-radius: 700px;
        margin: 10px;
        position: relative;
        top: 30%;
        left: 40%;
        animation: circle 10s ease 0s infinite alternate none;
      }
      @keyframes rightmove {
        from {
          top: 0;
          left: 0;
        }
        to {
          top: 0;
          left: 1286px;
        }
      }
      @keyframes leftmove {
        from {
          top: 380px;
          left: 1286px;
        }
        to {
          top: 380px;
          left: 0px;
        }
      }
      @keyframes circle {
        0% {
          top: 1%;
          left: 5%;
        }
        30% {
          top: 5%;
          left: 90%;
        }
        60% {
          top: 60%;
          left: 10%;
        }
        100% {
          top: 50%;
          left: 90%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box"></div>

      <div class="circle"></div>

      <div class="box2"></div>
    </div>
  </body>
</html>

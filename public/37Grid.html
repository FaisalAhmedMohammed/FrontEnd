<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Understanding Grid</title>
    <link rel="shortcut icon " href="images/favicon.ico" />
    <style>
      * {
        padding: 0px;
        margin: 0px;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        width: 100vw;
      }
      .container {
        height: 100%;
        width: 100%;
        background-color: rgba(57, 55, 55, 0.905);
        display: grid;
        padding: 40px;
        row-gap: 10px;
        column-gap: 10px;
        /* grid-template-columns: 4fr 4fr 4fr; */
        grid-template-columns: repeat(3, 4fr);

        /* grid-template-rows: 6fr 6fr; */
        grid-template-rows: repeat(4, 1fr);
      }
      .item {
        background-color: rgb(98, 98, 221);
        border: 4px solid black;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 30px;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: 600;
      }
      .Header {
        grid-column-start: 1;
        grid-column-end: 4;
      }
      .sidebar {
        grid-row-start: 2;
        grid-row-end: 4;
      }
      .footer {
        grid-column-start: 1;
        grid-column-end: 4;
      }
      .content1 {
        grid-column-start: 2;
        grid-column-end: 4;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item Header">Heading</div>
      <div class="item sidebar">Sidebar</div>
      <div class="item content1">content1</div>
      <div class="item">content2</div>
      <div class="item">content3</div>
      <div class="item footer">Footer</div>
    </div>
  </body>
</html>

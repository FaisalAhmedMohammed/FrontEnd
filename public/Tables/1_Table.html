    <title>Table Attributes</title>

  <body>
    <table
      width="50%"
      frame="void"
      border="1"
      cellspacing="10"
      cellpadding="10"
      bgcolor="lightblue"

          <th width="500" height="100">Product</th>
          <th width="500">Category</th>
          <th width="500">Price</th>
        </tr>
      </thead>

        <tr valign="center" align="center">
          <td>Laptop</td>
          <td>Electronics</td>
          <td>$800</td>
        </tr>
        <tr valign="center" align="center">

        </tr>
        <tr valign="center" align="center">
          <td>Table</td>
          <td>Furniture</td>
          <td>$200</td>
        </tr>
      </tbody>
    </table>
